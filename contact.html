<!DOCTYPE html>
<html lang="hi">
<head>
    <!-- WEB ICON -->
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Background aur overlay effect */
        body { 
            background: #0f0f0f; 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 60px 20px;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?ixlib=rb-4.0.3&auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-attachment: fixed;
        }

        .contact-section { max-width: 900px; margin: auto; background: rgba(255, 255, 255, 0.05); padding: 50px; border-radius: 20px; backdrop-filter: blur(15px); border: 1px solid rgba(255,215,0,0.3); }
        
        .header-text { text-align: center; margin-bottom: 50px; }
        .title { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: #ffd700; margin-bottom: 10px; }
        
        .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }

        /* Icon styling */
        .info-group { margin-bottom: 30px; }
        .icon-box { color: #ffd700; font-size: 1.5rem; margin-bottom: 10px; }
        
        /* Input Field Design */
        input, textarea { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #444; 
            padding: 15px; color: white; margin-bottom: 20px; border-radius: 8px;
        }
        
        .submit-btn { 
            background: #ffd700; color: #000; padding: 15px 40px; border: none; 
            cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s;
        }
        .submit-btn:hover { background: #fff; transform: scale(1.05); }

        @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<section class="contact-section">
    <div class="header-text">
        <h1 class="title"><i class="fas fa-utensils"></i> Contact Us</h1>
        <p>We'd love to hear from you. Get in touch with our team!</p>
    </div>

    <div class="layout">
        <div>
            <div class="info-group">
                <div class="icon-box"><i class="fas fa-map-marker-alt"></i></div>
                <strong>Address</strong><p>123 PohaFara Street, Main Market, City</p>
            </div>
            <div class="info-group">
                <div class="icon-box"><i class="fas fa-phone-alt"></i></div>
                <strong>Call Us</strong><p>+91 98765 43210</p>
            </div>
            <div class="info-group">
                <div class="icon-box"><i class="fas fa-envelope"></i></div>
                <strong>Email</strong><p>support@pohafara.com</p>
            </div>
        </div>

        <form>
            <input type="text" placeholder="Your Name">
            <input type="email" placeholder="Your Email">
            <textarea placeholder="Your Message" rows="4"></textarea>
            <button class="submit-btn">SEND MESSAGE</button>
        </form>
    </div>
</section>

</body>
</html>
